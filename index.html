<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- Google Fonts CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind and daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
    
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-base-200 p-10">
    <div class="min-h-[720px] max-w-lg mx-auto bg-white shadow-xl rounded-lg p-5">
        <div class="logo w-[100px] mx-auto pt-4">
            <img src="assets/github-logo.png" alt="">
        </div>
        <div class="text-center mt-5">
            <h2 class="text-primary text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-secondary">Sign in to manage your issues</p>
        </div>

        <div class="form pt-5">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Username</label>
                    <input id="input-number" type="text" class="input rounded-lg bg-base-200" placeholder="Enter Username" />
                    <p class="text-blue-700">Default: admin</p>
                    <label class="label text-neutral font-bold">Password</label>
                    <input id="input-pin" type="password" class="input rounded-lg bg-base-200" placeholder="Enter Password" />
                    <p class="text-blue-700">Default: admin123</p>
                    <button id="login-btn" class="btn btn-primary mt-2 rounded-lg w-80">Sign In</button>
                    </fieldset>
                </div>
            </div>
            <div class="divider w-full md:w-[80%] mx-auto"><span class="text-sm text-primary mt-2">OR</span></div>
            <div>
                <p class="text-center text-secondary text-sm">Demo Credentials:</p>
                <div class="bg-gray-100 text-center p-4 rounded-lg mt-3 w-10/12 mx-auto">
                    <p><span class="text-primary font-medium">Username:</span> <span class="text-secondary">admin</span></p>
                    <p><span class="text-primary font-medium">Password:</span> <span class="text-secondary">admin123</span></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
